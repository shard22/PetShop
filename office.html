<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>PetShop | Панель персонала</title>
    <link rel="stylesheet" href="style.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>
    <header class="main-header"></header>
    <div class="global-dash"></div>

    <main class="container" style="padding: 40px 0;">
        <div style="background:#fff; padding:30px; border-radius:24px; box-shadow: 0 10px 30px rgba(0,0,0,0.03);">
            <div style="display:flex; gap:10px; margin-bottom:30px">
                <button class="t-btn active" id="b-igor" onclick="officeTab('igor')">Админ (Игорь)</button>
                <button class="t-btn" id="b-alex" onclick="officeTab('alex')">Курьер (Алексей)</button>
            </div>

            <div id="v-igor">
                <h3>Прогноз востребованности  </h3>
                <p>Отчет для планирования закупок у поставщиков.</p>
                <div style="background:#f8fafc; padding:20px; border-radius:15px; margin-top:20px">
                    <p>Nulo: <strong>12 мешков</strong> </p>
                    <p>One Love: <strong>10 мешков</strong> </p>
                    <p>PetitRico: <strong>5 мешков</strong> </p>
                </div>
            </div>

            <div id="v-alex" style="display:none">
                <h3>Маршрутный лист: Петропавловск</h3>
                <div style="border-left:5px solid #2ecc71; padding:20px; background:#f1f5f9; border-radius:10px;">
                    <strong>ул. Конституции Казахстана, 12</strong><br>
                    <span style="color:#2ecc71; font-weight:700">ОПЛАЧЕНО ПО ПОДПИСКЕ</span>
                </div>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
    <script>
        function officeTab(r) {
            document.getElementById('v-igor').style.display = r === 'igor' ? 'block' : 'none';
            document.getElementById('v-alex').style.display = r === 'alex' ? 'block' : 'none';
            document.getElementById('b-igor').classList.toggle('active', r === 'igor');
            document.getElementById('b-alex').classList.toggle('active', r === 'alex');
        }
    </script>
</body>
</html>
